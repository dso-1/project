version: "3.8"

# docker-compose.yml ini digunakan di App Server
# untuk menjalankan container secara manual (opsional, alternatif docker run)

services:
  webapp:
    image: your-dockerhub-username/webapp-cicd:latest  # ganti username
    container_name: webapp
    restart: unless-stopped
    ports:
      - "80:5000"
    environment:
      - APP_VERSION=latest
      - BUILD_NUMBER=manual
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
